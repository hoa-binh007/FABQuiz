      padding: 24px;

      margin-bottom: 20px;

      height: 6px;
      background: #e2e8f0;
      border-radius: 3px;
      margin: 15px 0;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--primary);
      width: 0%;

    }

    .question-text {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 20px;
      color: #0f172a;
    }

    .answer-btn {
      width: 100%;
      text-align: left;
      border: 2px solid #f1f5f9;
      background: #f1f5f9;
      border-radius: 16px;
      padding: 18px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      transition: all 0.2s;

    .answer-btn.selected { border-color: var(--primary); background: white; }

    .answer-btn.wrong { background: #fee2e2; border-color: #ef4444; color: #991b1b; }

    .feedback {
      margin-top: 20px;
      padding: 15px;
      border-radius: 16px;
      background: #f8fafc;
      font-size: 14px;
      border-left: 4px solid var(--primary);
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-top: 30px;
    }
    .btn {
      flex: 1;
      padding: 16px;
      border-radius: 16px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
      transition: transform 0.1s;

    .btn-primary { background: var(--primary); color: white; }
    .btn-secondary { background: #e2e8f0; color: #475569; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;

      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      background: white;
      cursor: pointer;

</head>

let cur = 0;
let allQuestions = [...questions];
let activeQuestions = [...questions];
let states = Array(activeQuestions.length).fill(null);
let revealed = Array(activeQuestions.length).fill(false);
let isCorrectList = Array(activeQuestions.length).fill(null);
let wrongQuestionIndices = [];
let isRepeatMode = false;

function render() {
  const data = activeQuestions[cur];

  document.getElementById('qText').innerText = data.q;
  document.getElementById('qn').innerText = cur + 1;
  document.getElementById('total').innerText = activeQuestions.length;
  document.getElementById('progressFill').style.width =
    ((cur + 1) / activeQuestions.length * 100) + "%";

document.getElementById('modeLabel').innerText = isRepeatMode ? 'Wiederholungsmodus' : 'Alle Fragen';

  const box = document.getElementById('ansBox');
  box.innerHTML = "";

  data.o.forEach((opt, i) => {
    const b = document.createElement('button');
    b.className = 'answer-btn';

    if (states[cur] === i) {
      b.classList.add('selected');
    }

    if (revealed[cur]) {
      if (i === data.a) {
        b.classList.add('correct');
      } else if (states[cur] === i && i !== data.a) {
        b.classList.add('wrong');
      }
    }

    b.innerHTML = "<strong>" + String.fromCharCode(65 + i) + ".</strong> " + opt;

    b.onclick = () => {
      if (revealed[cur]) return;

      states[cur] = i;
      revealed[cur] = true;

      const correct = i === data.a;
      isCorrectList[cur] = correct;

      if (!correct && !wrongQuestionIndices.includes(cur)) {
        wrongQuestionIndices.push(cur);
      }

      render();
    };

    box.appendChild(b);
  });

  const fb = document.getElementById('fbBox');
  fb.style.display = revealed[cur] ? 'block' : 'none';

  if (revealed[cur]) {
    const correct = isCorrectList[cur];
    fb.innerHTML = `
      <div class="feedback">
        <strong style="color:${correct ? '#166534' : '#991b1b'};">
          ${correct ? 'Richtig beantwortet.' : 'Falsch beantwortet.'}
        </strong>
        <br><br>
        ${data.e}
      </div>
    `;
  } else {
    fb.innerHTML = "";
  }

  document.getElementById('btnPrev').disabled = cur === 0;
  document.getElementById('btnNext').disabled = cur === activeQuestions.length - 1;

  updateStats();
  renderGrid();
}

function renderGrid() {
  const g = document.getElementById('qGrid');
  g.innerHTML = "";

  activeQuestions.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'grid-dot';

    if (i === cur) {
      d.classList.add('active');
    }

    if (revealed[i]) {
      d.classList.add('done');
    }

    d.innerText = i + 1;
    d.onclick = () => {
      cur = i;
      render();
    };

    g.appendChild(d);
  });
}

function updateStats() {
  const answered = revealed.filter(x => x).length;
  const correct = isCorrectList.filter(x => x === true).length;
  const wrong = isCorrectList.filter(x => x === false).length;

  document.getElementById('statsAnswered').innerText = answered;
  document.getElementById('statsCorrect').innerText = correct;
  document.getElementById('statsWrong').innerText = wrong;
  document.getElementById('statsTotal').innerText = activeQuestions.length;
}

function changeQ(dir) {
  cur = Math.max(0, Math.min(activeQuestions.length - 1, cur + dir));
  render();
}

function startWrongRepeat() {
  if (wrongQuestionIndices.length === 0) {
    alert("Aktuell gibt es keine falsch beantworteten Fragen.");
    return;
  }

  activeQuestions = wrongQuestionIndices.map(index => allQuestions[index]);
  cur = 0;
  states = Array(activeQuestions.length).fill(null);
  revealed = Array(activeQuestions.length).fill(false);
  isCorrectList = Array(activeQuestions.length).fill(null);
  wrongQuestionIndices = [];
  isRepeatMode = true;

  render();
}

function showAllQuestions() {
  activeQuestions = [...allQuestions];
  cur = 0;
  states = Array(activeQuestions.length).fill(null);
  revealed = Array(activeQuestions.length).fill(false);
  isCorrectList = Array(activeQuestions.length).fill(null);
  wrongQuestionIndices = [];
  isRepeatMode = false;

  render();
}

render();

  
</script>
