<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAB Klausurtrainer - Fach 4</title>
  <style>
    :root {
      --color-fach1: #ef4444;
      --color-fach2: #3b82f6;
      --color-fach3: #6b7280;
      --color-fach4: #10b981;

      --primary: var(--color-fach4);
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --green-bg: #dcfce7;
      --green-border: #22c55e;
      --green-text: #166534;
      --red-bg: #fee2e2;
      --red-border: #ef4444;
      --red-text: #991b1b;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 15px;
    }

    .top-link {
      display: inline-block;
      margin: 10px 0 20px;
      text-decoration: none;
      color: var(--primary);
      font-weight: bold;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      background: var(--primary);
      color: white;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      margin-bottom: 20px;
    }

    .progress-bar {
      height: 6px;
      background: #e2e8f0;
      border-radius: 3px;
      margin: 15px 0;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--primary);
      width: 0%;
      transition: width 0.3s ease;
    }

    .question-meta {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .question-text {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 20px;
      color: #0f172a;
    }

    .answers {
      display: grid;
      gap: 12px;
    }

    .answer-btn {
      width: 100%;
      text-align: left;
      border: 2px solid #f1f5f9;
      background: #f1f5f9;
      border-radius: 16px;
      padding: 18px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .answer-btn:hover {
      border-color: #cbd5e1;
    }

    .answer-btn.selected {
      border-color: var(--primary);
      background: white;
    }

    .answer-btn.correct {
      background: var(--green-bg);
      border-color: var(--green-border);
      color: var(--green-text);
    }

    .answer-btn.wrong {
      background: var(--red-bg);
      border-color: var(--red-border);
      color: var(--red-text);
    }

    .feedback {
      margin-top: 20px;
      padding: 15px;
      border-radius: 16px;
      background: #f8fafc;
      font-size: 14px;
      border-left: 4px solid var(--primary);
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      min-width: 180px;
      padding: 16px;
      border-radius: 16px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
      transition: transform 0.1s;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #475569;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }

    .grid-dot {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      background: white;
      cursor: pointer;
      color: var(--text);
    }

    .grid-dot.active {
      border: 2px solid var(--primary);
      color: var(--primary);
    }

    .grid-dot.correct {
      background: var(--green-bg);
      border-color: var(--green-border);
      color: var(--green-text);
    }

    .grid-dot.wrong {
      background: var(--red-bg);
      border-color: var(--red-border);
      color: var(--red-text);
    }

    .note {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>

<div class="container">
  <a class="top-link" href="index.html">← Zurück zur Startseite</a>

  <div class="header">
    <span class="badge">Fach 4</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div style="font-size: 14px; color: #64748b;">
      Frage <span id="qn">1</span> von <span id="total">0</span>
    </div>
  </div>

  <div class="card">
    <div class="question-meta" id="questionMeta">Frage wird geladen ...</div>
    <div class="question-text" id="qText">Lade Fragen...</div>
    <div class="answers" id="ansBox"></div>
    <div id="fbBox" style="display:none"></div>

    <div class="controls">
      <button class="btn btn-secondary" id="btnPrev" onclick="changeQ(-1)">Zurück</button>
      <button class="btn btn-secondary" id="btnNext" onclick="changeQ(1)">Weiter</button>
    </div>
  </div>

  <div class="grid" id="qGrid"></div>

  <div class="card">
    <h3>Deine Übersicht</h3>
    <p><strong>Modus:</strong> <span id="modeLabel">Alle Fragen</span></p>
    <p><strong>Beantwortet:</strong> <span id="statsAnswered">0</span> / <span id="statsTotal">0</span></p>
    <p><strong>Richtig:</strong> <span id="statsCorrect">0</span></p>
    <p><strong>Falsch:</strong> <span id="statsWrong">0</span></p>

    <div class="controls" style="margin-top:16px;">
      <button class="btn btn-primary" onclick="startWrongRepeat()">Falsche Fragen wiederholen</button>
      <button class="btn btn-secondary" onclick="showAllQuestions()">Alle Fragen</button>
    </div>

    <div class="note">
      Platzhalter für Fach 4. Die echten Fragen fügst du später ein.
    </div>
  </div>
</div>

<script>
  function shuffleArray(array) {
    const copy = [...array];
    for (let i = copy.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  const rawQuestions = [
  {
    nr: 1,
    q: "Wie kommt ein Vertrag zustande?",
    e: "Ein Vertrag entsteht durch Angebot und Annahme, also durch zwei- oder mehrseitige übereinstimmende Willenserklärungen.",
    o: [
      "Nur durch eine einseitige Willenserklärung",
      "Durch Angebot und Annahme (zwei- oder mehrseitige Willenserklärungen)",
      "Ausschließlich durch schriftliche Unterzeichnung beim Notar",
      "Indem man eine Ware ohne Bezahlung mitnimmt"
    ],
    correctText: "Durch Angebot und Annahme (zwei- oder mehrseitige Willenserklärungen)"
  },
  {
    nr: 2,
    q: "Welche Pflichten haben Käufer und Verkäufer bei einem Kaufvertrag?",
    e: "Der Käufer muss zahlen und das Gut annehmen; der Verkäufer muss mangelfreies Gut übereignen.",
    o: [
      "Käufer: mangelfreie Ware liefern; Verkäufer: Ware annehmen",
      "Käufer: zahlen und Gut annehmen; Verkäufer: mangelfreies Gut übereignen",
      "Beide müssen nur die Rechnung unterschreiben",
      "Der Verkäufer hat keine Pflichten nach der Bezahlung"
    ],
    correctText: "Käufer: zahlen und Gut annehmen; Verkäufer: mangelfreies Gut übereignen"
  },
  {
    nr: 5,
    q: "Welche Vertragsarten kommen im Schwimmbad vor?",
    e: "Typisch sind Bade-, Miet-, Leih-, Dienst-, Werk-, Kauf- und ggf. Pachtverträge.",
    o: [
      "Nur Arbeitsverträge und Versicherungsverträge",
      "Badevertrag, Mietvertrag, Leihvertrag, Dienstvertrag, Werkvertrag, Kaufvertrag, ggf. Pachtvertrag",
      "Ausschließlich der Tarifvertrag des öffentlichen Dienstes",
      "Kreditverträge und Bausparverträge"
    ],
    correctText: "Badevertrag, Mietvertrag, Leihvertrag, Dienstvertrag, Werkvertrag, Kaufvertrag, ggf. Pachtvertrag"
  },
  {
    nr: 10,
    q: "Wie wird die Geschäftsfähigkeit nach BGB differenziert?",
    e: "Geschäftsunfähig (bis 7 Jahre), beschränkt geschäftsfähig (7–17 Jahre) und voll geschäftsfähig (ab 18 Jahre).",
    o: [
      "Alle Menschen sind ab der Geburt voll geschäftsfähig",
      "Geschäftsunfähig (bis 7 J.), beschränkt geschäftsfähig (7-17 J.), voll geschäftsfähig (ab 18 J.)",
      "Man ist erst mit Abschluss einer Ausbildung geschäftsfähig",
      "Nur wer ein eigenes Einkommen hat, ist geschäftsfähig"
    ],
    correctText: "Geschäftsunfähig (bis 7 J.), beschränkt geschäftsfähig (7-17 J.), voll geschäftsfähig (ab 18 J.)"
  },
  {
    nr: 11,
    q: "Was bedeutet 'Tarifautonomie'?",
    e: "Tarifautonomie bedeutet, dass Gewerkschaften und Arbeitgeberverbände Tarifverträge ohne staatliche Einflussnahme selbstständig regeln.",
    o: [
      "Dass der Staat die Löhne für alle Betriebe festlegt",
      "Selbstständige Regelung von Tarifverträgen durch Sozialpartner ohne staatliche Einflussnahme",
      "Dass jeder Mitarbeiter seinen Lohn selbst mit dem Finanzamt aushandelt",
      "Die Pflicht, Überstunden immer mit Freizeit auszugleichen"
    ],
    correctText: "Selbstständige Regelung von Tarifverträgen durch Sozialpartner ohne staatliche Einflussnahme"
  },
  {
    nr: 15,
    q: "Wie lautet Artikel 1 Absatz 1 des Grundgesetzes (GG)?",
    e: "Die Würde des Menschen ist unantastbar. Sie zu achten und zu schützen ist Verpflichtung aller staatlichen Gewalt.",
    o: [
      "Eigentum verpflichtet",
      "Die Würde des Menschen ist unantastbar. Sie zu achten und zu schützen ist Verpflichtung aller staatlichen Gewalt.",
      "Alle Menschen sind vor dem Gesetz gleich",
      "Jeder hat das Recht auf freie Entfaltung seiner Persönlichkeit"
    ],
    correctText: "Die Würde des Menschen ist unantastbar. Sie zu achten und zu schützen ist Verpflichtung aller staatlichen Gewalt."
  },
  {
    nr: 17,
    q: "Welche Abzüge werden vom Bruttolohn einbehalten?",
    e: "Einbehalten werden Lohnsteuer, Kirchensteuer, Rentenversicherung, Arbeitslosenversicherung, Krankenversicherung und Pflegeversicherung.",
    o: [
      "Nur die Mehrwertsteuer und die Kfz-Steuer",
      "Lohnsteuer, Kirchensteuer, RV, AV, KV und Pflegeversicherung",
      "Ausschließlich die Miete und Stromkosten",
      "Nur die Haftpflichtversicherung des Arbeitgebers"
    ],
    correctText: "Lohnsteuer, Kirchensteuer, RV, AV, KV und Pflegeversicherung"
  },
  {
    nr: 18,
    q: "Welche Aufgabe übernimmt die gesetzliche Unfallversicherung?",
    e: "Sie übernimmt die Versorgung der Verunfallten sowie Unfallverhütung und Rehabilitation.",
    o: [
      "Zahlung von Krankengeld bei Grippe",
      "Versorgung der Verunfallten, Unfallverhütung und Rehabilitation",
      "Finanzierung des Zahnersatzes",
      "Beratung im Pflegefall"
    ],
    correctText: "Versorgung der Verunfallten, Unfallverhütung und Rehabilitation"
  },
  {
    nr: 22,
    q: "Wann ist eine fristlose Kündigung zulässig?",
    e: "Eine fristlose Kündigung ist bei Vorliegen eines wichtigen Grundes zulässig, zum Beispiel bei Diebstahl.",
    o: [
      "Wenn man einmal 5 Minuten zu spät kommt",
      "Bei Vorlage eines wichtigen Grundes (z. B. Diebstahl)",
      "Sobald man eine neue Stelle gefunden hat",
      "Nur wenn der Betrieb wirtschaftliche Probleme hat"
    ],
    correctText: "Bei Vorlage eines wichtigen Grundes (z. B. Diebstahl)"
  },
  {
    nr: 24,
    q: "Wann beginnt die Rechtsfähigkeit einer natürlichen Person?",
    e: "Die Rechtsfähigkeit beginnt mit der Vollendung der Geburt und endet mit dem Tod.",
    o: [
      "Mit dem 7. Lebensjahr",
      "Mit der Vollendung der Geburt",
      "Erst mit der Volljährigkeit (18 Jahre)",
      "Sobald man einen Personalausweis besitzt"
    ],
    correctText: "Mit der Vollendung der Geburt"
  },
  {
    nr: 27,
    q: "Welche 5 Grundsätze gelten für die demokratische Wahl?",
    e: "Die Wahl muss allgemein, unmittelbar, frei, gleich und geheim sein.",
    o: [
      "Öffentlich, teuer, verpflichtend, jährlich, schriftlich",
      "Allgemein, unmittelbar, frei, gleich, geheim",
      "Nur für Parteimitglieder, digital, gewichtet, offen, freiwillig",
      "Zentral, indirekt, gebunden, ungleich, geschützt"
    ],
    correctText: "Allgemein, unmittelbar, frei, gleich, geheim"
  },
  {
    nr: 28,
    q: "Welche Personengruppen genießen besonderen Kündigungsschutz?",
    e: "Besonderen Kündigungsschutz genießen Schwangere bzw. Mütter, Auszubildende, Schwerbehinderte und Mitglieder von Betriebsverfassungsorganen.",
    o: [
      "Alle Mitarbeiter in der Probezeit",
      "Schwangere, Auszubildende, Schwerbehinderte, Mitglieder von Betriebsverfassungsorganen",
      "Nur Mitarbeiter mit einem befristeten Vertrag",
      "Ausschließlich die Geschäftsführung"
    ],
    correctText: "Schwangere, Auszubildende, Schwerbehinderte, Mitglieder von Betriebsverfassungsorganen"
  }
];



  const questions = shuffleArray(rawQuestions).map(q => {
    const shuffledOptions = shuffleArray(q.o);

    return {
      ...q,
      o: shuffledOptions,
      a: shuffledOptions.indexOf(q.correctText)
    };
  });

  let cur = 0;
  let allQuestions = [...questions];
  let activeQuestions = [...questions];
  let states = Array(activeQuestions.length).fill(null);
  let revealed = Array(activeQuestions.length).fill(false);
  let isCorrectList = Array(activeQuestions.length).fill(null);
  let wrongQuestionIndices = [];
  let isRepeatMode = false;

  function render() {
    const data = activeQuestions[cur];

    document.getElementById('questionMeta').innerText = `Nr. ${data.nr}`;
    document.getElementById('qText').innerText = data.q;
    document.getElementById('qn').innerText = cur + 1;
    document.getElementById('total').innerText = activeQuestions.length;
    document.getElementById('progressFill').style.width =
      ((cur + 1) / activeQuestions.length * 100) + "%";
    document.getElementById('modeLabel').innerText =
      isRepeatMode ? "Wiederholungsmodus" : "Alle Fragen";

    const box = document.getElementById('ansBox');
    box.innerHTML = "";

    data.o.forEach((opt, i) => {
      const b = document.createElement('button');
      b.className = 'answer-btn';

      if (states[cur] === i) {
        b.classList.add('selected');
      }

      if (revealed[cur]) {
        if (i === data.a) {
          b.classList.add('correct');
        } else if (states[cur] === i && i !== data.a) {
          b.classList.add('wrong');
        }
      }

      b.innerHTML = "<strong>" + String.fromCharCode(65 + i) + ".</strong> " + opt;

      b.onclick = () => {
        if (revealed[cur]) return;

        states[cur] = i;
        revealed[cur] = true;

        const correct = i === data.a;
        isCorrectList[cur] = correct;

        if (!correct && !wrongQuestionIndices.includes(cur)) {
          wrongQuestionIndices.push(cur);
        }

        render();
      };

      box.appendChild(b);
    });

    const fb = document.getElementById('fbBox');
    fb.style.display = revealed[cur] ? 'block' : 'none';

    if (revealed[cur]) {
      const correct = isCorrectList[cur];
      fb.innerHTML = `
        <div class="feedback">
          <strong style="color:${correct ? '#166534' : '#991b1b'};">
            ${correct ? 'Richtig beantwortet.' : 'Falsch beantwortet.'}
          </strong>
          <br><br>
          ${data.e}
        </div>
      `;
    } else {
      fb.innerHTML = "";
    }

    document.getElementById('btnPrev').disabled = cur === 0;
    document.getElementById('btnNext').disabled = cur === activeQuestions.length - 1;

    updateStats();
    renderGrid();
  }

  function renderGrid() {
    const g = document.getElementById('qGrid');
    g.innerHTML = "";

    activeQuestions.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'grid-dot';

      if (isCorrectList[i] === true) d.classList.add('correct');
      if (isCorrectList[i] === false) d.classList.add('wrong');
      if (i === cur) d.classList.add('active');

      d.innerText = i + 1;
      d.onclick = () => {
        cur = i;
        render();
      };

      g.appendChild(d);
    });
  }

  function updateStats() {
    const answered = revealed.filter(Boolean).length;
    const correct = isCorrectList.filter(x => x === true).length;
    const wrong = isCorrectList.filter(x => x === false).length;

    document.getElementById('statsAnswered').innerText = answered;
    document.getElementById('statsCorrect').innerText = correct;
    document.getElementById('statsWrong').innerText = wrong;
    document.getElementById('statsTotal').innerText = activeQuestions.length;
  }

  function changeQ(dir) {
    cur = Math.max(0, Math.min(activeQuestions.length - 1, cur + dir));
    render();
  }

  function resetStateForActiveQuestions() {
    states = Array(activeQuestions.length).fill(null);
    revealed = Array(activeQuestions.length).fill(false);
    isCorrectList = Array(activeQuestions.length).fill(null);
    wrongQuestionIndices = [];
  }

  function startWrongRepeat() {
    if (wrongQuestionIndices.length === 0) {
      alert("Aktuell gibt es keine falsch beantworteten Fragen.");
      return;
    }

    activeQuestions = wrongQuestionIndices.map(index => allQuestions[index]);
    cur = 0;
    resetStateForActiveQuestions();
    isRepeatMode = true;
    render();
  }

  function showAllQuestions() {
    activeQuestions = [...allQuestions];
    cur = 0;
    resetStateForActiveQuestions();
    isRepeatMode = false;
    render();
  }

  render();
</script>
</body>
</html>
