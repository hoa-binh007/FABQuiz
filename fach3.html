      padding: 18px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      transition: all 0.2s;

      border-color: #cbd5e1;
    }

      border-color: var(--primary);
      background: white;
    }

    .answer-btn.correct {
      background: var(--green-bg);
      border-color: var(--green-border);
      color: var(--green-text);
    }

    .answer-btn.wrong {
      background: var(--red-bg);
      border-color: var(--red-border);
      color: var(--red-text);
    }

      margin-top: 20px;
      padding: 15px;
      border-radius: 16px;
      background: #f8fafc;
      font-size: 14px;
      border-left: 4px solid var(--primary);
    }

      display: flex;
      gap: 10px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      min-width: 180px;
      padding: 16px;
      border-radius: 16px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
      transition: transform 0.1s;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #475569;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }

      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      background: white;
      cursor: pointer;
      color: var(--text);

</head>

        "H2SO4 + NaCl"
      ],
      correctText: "NaCl + H2O"
    },
    {
      nr: 34,
      q: "Warum kann der pH-Wert schwanken?",
      e: "Zum Beispiel durch Ausgasen von Kohlendioxid (CO2), Chlor, sauren Regen, hohe Temperatur und viele Badegäste.",
      o: [
        "Durch CO2-Ausgasung, Chlor, sauren Regen, hohe Temperatur, viele Badegäste",
        "Nur durch die Beleuchtung",
        "Nur durch die Umwälzpumpe",
        "Nur durch die Rückspülung"
      ],
      correctText: "Durch CO2-Ausgasung, Chlor, sauren Regen, hohe Temperatur, viele Badegäste"
    },
    {
      nr: 35,
      q: "Wozu dient Marmorkies und welche Alternative wird genannt?",
      e: "Marmorkies wird in offenen Filtern oder Druckfiltern eingesetzt, um saures Wasser zu neutralisieren. Als Alternative werden Soda und Natronlauge genannt.",
      o: [
        "Zur Neutralisation von saurem Wasser; Alternative: Soda oder Natronlauge",
        "Zur Desinfektion; Alternative: Ozon",
        "Zur Flockung; Alternative: Aluminiumsulfat",
        "Zur Erwärmung; Alternative: Dampf"
      ],
      correctText: "Zur Neutralisation von saurem Wasser; Alternative: Soda oder Natronlauge"
    },
    {
      nr: 38,
      q: "Wie viel Flockungsmittel wird bei 180 m³/h und 0,3 g/m³ pro Stunde verbraucht?",
      e: "54,0 g/h.",
      o: [
        "54,0 g/h",
        "18,0 g/h",
        "180,0 g/h",
        "0,3 g/h"
      ],
      correctText: "54,0 g/h"
    },
    {
      nr: 39,
      q: "Welche drei Aufgaben erledigt der Sorptionsfilter bei Ozon-Verfahren?",
      e: "Abbau von Restozon, Entfernung von Oxidationsnebenprodukten, Reduktion von gebundenem Chlor.",
      o: [
        "Abbau von Restozon, Entfernung von Oxidationsnebenprodukten, Reduktion von gebundenem Chlor",
        "Erhöhung der Wasserhärte, pH-Wert-Anhebung, Erwärmung",
        "Nur Chlorzugabe",
        "Nur Flockungsmitteldosierung"
      ],
      correctText: "Abbau von Restozon, Entfernung von Oxidationsnebenprodukten, Reduktion von gebundenem Chlor"
    },
    {
      nr: 41,
      q: "Wofür steht die Angabe 'n' auf dem Typenschild einer Pumpe?",
      e: "n steht für die Drehzahl.",
      o: [
        "Drehzahl",
        "Spannung",
        "Leistung",
        "Volumenstrom"
      ],
      correctText: "Drehzahl"
    }
  ];

  const questions = shuffleArray(rawQuestions).map(q => {
    const shuffledOptions = shuffleArray(q.o);
    return {
      ...q,
      o: shuffledOptions,
      a: shuffledOptions.indexOf(q.correctText)
    };
  });

  let cur = 0;
  let allQuestions = [...questions];
  let activeQuestions = [...questions];
  let states = Array(activeQuestions.length).fill(null);
  let revealed = Array(activeQuestions.length).fill(false);
  let isCorrectList = Array(activeQuestions.length).fill(null);
  let wrongQuestionIndices = [];
  let isRepeatMode = false;

  function render() {
    const data = activeQuestions[cur];

    document.getElementById('questionMeta').innerText = `Nr. ${data.nr}`;
    document.getElementById('qText').innerText = data.q;
    document.getElementById('qn').innerText = cur + 1;
    document.getElementById('total').innerText = activeQuestions.length;
    document.getElementById('progressFill').style.width =
      ((cur + 1) / activeQuestions.length * 100) + "%";
    document.getElementById('modeLabel').innerText =
      isRepeatMode ? "Wiederholungsmodus" : "Alle Fragen";

    const box = document.getElementById('ansBox');
    box.innerHTML = "";

    data.o.forEach((opt, i) => {
      const b = document.createElement('button');
      b.className = 'answer-btn';

      if (states[cur] === i) b.classList.add('selected');

      if (revealed[cur]) {
        if (i === data.a) {
          b.classList.add('correct');
        } else if (states[cur] === i && i !== data.a) {
          b.classList.add('wrong');
        }
      }

      b.innerHTML = "<strong>" + String.fromCharCode(65 + i) + ".</strong> " + opt;

      b.onclick = () => {
        if (revealed[cur]) return;
        states[cur] = i;
        revealed[cur] = true;

        const correct = i === data.a;
        isCorrectList[cur] = correct;

        if (!correct && !wrongQuestionIndices.includes(cur)) {
          wrongQuestionIndices.push(cur);
        }

        render();
      };

      box.appendChild(b);
    });

    const fb = document.getElementById('fbBox');
    fb.style.display = revealed[cur] ? 'block' : 'none';

    if (revealed[cur]) {
      const correct = isCorrectList[cur];
      fb.innerHTML = `
        <div class="feedback">
          <strong style="color:${correct ? '#166534' : '#991b1b'};">
            ${correct ? 'Richtig beantwortet.' : 'Falsch beantwortet.'}
          </strong>
          <br><br>
          ${data.e}
        </div>
      `;
    } else {
      fb.innerHTML = "";
    }

    document.getElementById('btnPrev').disabled = cur === 0;
    document.getElementById('btnNext').disabled = cur === activeQuestions.length - 1;

    updateStats();
    renderGrid();
  }

  function renderGrid() {
    const g = document.getElementById('qGrid');
    g.innerHTML = "";

    activeQuestions.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'grid-dot';

      if (isCorrectList[i] === true) d.classList.add('correct');
      if (isCorrectList[i] === false) d.classList.add('wrong');
      if (i === cur) d.classList.add('active');

      d.innerText = i + 1;
      d.onclick = () => {
        cur = i;
        render();
      };

      g.appendChild(d);
    });
  }

  function updateStats() {
    const answered = revealed.filter(Boolean).length;
    const correct = isCorrectList.filter(x => x === true).length;
    const wrong = isCorrectList.filter(x => x === false).length;

    document.getElementById('statsAnswered').innerText = answered;
    document.getElementById('statsCorrect').innerText = correct;
    document.getElementById('statsWrong').innerText = wrong;
    document.getElementById('statsTotal').innerText = activeQuestions.length;
  }

  function changeQ(dir) {
    cur = Math.max(0, Math.min(activeQuestions.length - 1, cur + dir));
    render();
  }

  function resetStateForActiveQuestions() {
    states = Array(activeQuestions.length).fill(null);
    revealed = Array(activeQuestions.length).fill(false);
    isCorrectList = Array(activeQuestions.length).fill(null);
    wrongQuestionIndices = [];
  }

  function startWrongRepeat() {
    if (wrongQuestionIndices.length === 0) {
      alert("Aktuell gibt es keine falsch beantworteten Fragen.");
      return;
    }

    activeQuestions = wrongQuestionIndices.map(index => allQuestions[index]);
    cur = 0;
    resetStateForActiveQuestions();
    isRepeatMode = true;
    render();
  }

  function showAllQuestions() {
    activeQuestions = [...allQuestions];
    cur = 0;
    resetStateForActiveQuestions();
    isRepeatMode = false;
    render();
  }

  render();
</script>
