  <style>

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;

      background: var(--bg);
      color: var(--text);
      line-height: 1.5;

      color: var(--primary);

      padding: 4px 12px;
      border-radius: 20px;
      background: var(--primary);
      color: white;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 8px;
      background: #e2e8f0;
      border-radius: 4px;
      margin: 15px 0;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--primary);
      width: 0%;
      transition: width 0.3s ease;
    }

    .card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      margin-bottom: 20px;

    .question-text { font-size: 20px; font-weight: 800; margin-bottom: 20px; color: #0f172a; }

    .answers { display: grid; gap: 12px; }

    .answer-btn {
      width: 100%;
      text-align: left;
      border: 2px solid #f1f5f9;
      background: #f1f5f9;
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s;
    }

    .answer-btn:hover:not(:disabled) { border-color: #cbd5e1; }
    .answer-btn.selected { border-color: var(--primary); background: white; }
    .answer-btn.correct { background: var(--green-bg); border-color: var(--green-border); color: var(--green-text); }
    .answer-btn.wrong { background: var(--red-bg); border-color: var(--red-border); color: var(--red-text); }

    .feedback {
      margin-top: 20px;
      padding: 15px;
      border-radius: 16px;
      background: #f8fafc;
      border-left: 4px solid var(--primary);
    }

    .controls { display: flex; gap: 10px; margin-top: 30px; flex-wrap: wrap; }
    .btn {
      flex: 1;
      min-width: 150px;
      padding: 16px;
      border-radius: 16px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    .btn-primary { background: var(--primary); color: white; }
    .btn-secondary { background: #e2e8f0; color: #475569; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 20px; }
    .grid-dot {
      width: 35px; height: 35px; border-radius: 10px;
      border: 1px solid #e2e8f0; display: flex;
      align-items: center; justify-content: center;
      font-size: 11px; font-weight: bold; background: white; cursor: pointer;
    }
    .grid-dot.active { border: 2px solid var(--primary); color: var(--primary); }
    .grid-dot.correct { background: var(--green-bg); border-color: var(--green-border); color: var(--green-text); }
    .grid-dot.wrong { background: var(--red-bg); border-color: var(--red-border); color: var(--red-text); }

</head>

    { nr: 28, q: "Die Satzung einer Gewerkschaft verlangt, dass eine Urabstimmung durchgeführt wird, bevor Arbeitskampfmaßnahmen eingeleitet werden. Welche Erläuterung hierzu ist richtig?", e: "Richtig ist: Die Arbeitnehmer, die Mitglieder der Gewerkschaft sind, stimmen über die geplanten Maßnahmen ab.", o: ["Alle Arbeitnehmer in dem betroffenen Tarifgebiet stimmen über diese Maßnahmen ab.", "Die Gewerkschaft muss mit dem zuständigen Arbeitgeberverband ihre geplanten Maßnahmen abstimmen.", "Die Arbeitnehmer, die Mitglieder der Gewerkschaft sind, stimmen über die geplanten Maßnahmen ab.", "Die Gewerkschaft muss ihre Maßnahmen mit dem Wirtschaftsministerium abklären.", "Es muss eine paritätische Schlichtungskommission gebildet werden. Deren Mitglieder stimmen über die geplanten Maßnahmen ab."], correctText: "Die Arbeitnehmer, die Mitglieder der Gewerkschaft sind, stimmen über die geplanten Maßnahmen ab." },
    { nr: 29, q: "Zwischen dem Metallarbeitgeberverband und der IG Metall wurde ein Tarifvertrag abgeschlossen. Darf ein Arbeitgeber der Metallindustrie trotzdem untertarifliche Löhne zahlen?", e: "Richtig ist: Ja, wenn der Arbeitgeber dem Arbeitgeberverband nicht angehört und wenn der Tarifvertrag nicht für allgemein verbindlich erklärt wurde.", o: ["Ja, wenn die schlechte Auftragslage es erfordert.", "Ja, wenn der Betrieb seit mehr als drei Monaten Kurzarbeit hat.", "Ja, wenn das Arbeitsamt die Genehmigung dazu erteilt.", "Ja, wenn der Arbeitgeber dem Arbeitgeberverband nicht angehört und wenn der Tarifvertrag nicht für allgemein verbindlich erklärt wurde.", "Nein, jeder Arbeitgeber muss sich an den Tarifvertrag halten."], correctText: "Ja, wenn der Arbeitgeber dem Arbeitgeberverband nicht angehört und wenn der Tarifvertrag nicht für allgemein verbindlich erklärt wurde." },
    { nr: 30, q: "Welche Aussage über Manteltarifverträge trifft zu?", e: "Richtig ist: Manteltarifverträge regeln Arbeitsbedingungen wie z. B. Arbeitszeit, Urlaub oder Überstundenzuschläge.", o: ["Manteltarifverträge regeln Arbeitsbedingungen wie z. B. Arbeitszeit, Urlaub oder Überstundenzuschläge.", "Manteltarifverträge regeln spezielle Besonderheiten des einzelnen Betriebs wie z. B. Pausenregelung, Arbeitsanfang, Arbeitsende. Sie werden zwischen Arbeitgeber und Betriebsrat vereinbart.", "Die Arbeitgeberverbände sind berechtigt, einen Manteltarifvertrag für allgemein verbindlich zu erklären.", "Die Gewerkschaften sind berechtigt, einen Manteltarifvertrag für allgemein verbindlich zu erklären.", "Wenn wichtige Gründe vorliegen, kann jeder Arbeitgeber von den Bestimmungen des Manteltarifvertrages abweichen."], correctText: "Manteltarifverträge regeln Arbeitsbedingungen wie z. B. Arbeitszeit, Urlaub oder Überstundenzuschläge." },
    { nr: 31, q: "Welche Aussage über Tarifverträge ist richtig?", e: "Richtig ist: Während der Laufzeit eines Tarifvertrags sind Streik oder Aussperrung untersagt.", o: ["Während der Laufzeit eines Tarifvertrags sind Streik oder Aussperrung untersagt.", "Die Laufzeit der Tarifverträge muss nach dem Tarifvertragsgesetz mindestens 12 Monate betragen.", "Nach dem Tarifvertragsgesetz müssen Tarifverträge drei Monate vor Ablauf der Laufzeit gekündigt werden.", "Die meisten Tarifverträge werden zwischen dem DGB und den Arbeitgeberverbänden abgeschlossen.", "Die im Tarifvertrag vereinbarten Arbeitsbedingungen können beim Vorliegen zwingender Gründe, z. B. Rezession, unterschritten werden."], correctText: "Während der Laufzeit eines Tarifvertrags sind Streik oder Aussperrung untersagt." },
    { nr: 32, q: "Welche Aussage über Tarifverträge ist richtig?", e: "Richtig ist: Tarifverträge dürfen nicht gegen geltendes Recht verstoßen.", o: ["Tarifverträge werden immer von den Spitzenorganisationen auf Bundesebene ausgehandelt und gelten dann für das gesamte Bundesgebiet.", "Tarifverträge dürfen nicht gegen geltendes Recht verstoßen.", "Tarifverträge müssen vom Bundesarbeitsministerium genehmigt werden.", "Tarifverträge können jederzeit von beiden Vertragspartnern gekündigt werden."], correctText: "Tarifverträge dürfen nicht gegen geltendes Recht verstoßen." },
    { nr: 33, q: "In einem allgemein verbindlichen Tarifvertrag ist eine bestimmte Entlohnung festgelegt. Welche Bedeutung hat diese Festlegung?", e: "Richtig ist: Die Entlohnung darf nicht unterschritten werden.", o: ["Die Entlohnung darf nicht überschritten werden.", "Die Höhe der Entlohnung ist völlig unverbindlich.", "Die Entlohnung kann geringfügig über- oder unterschritten werden.", "Die Entlohnung darf nicht unterschritten werden."], correctText: "Die Entlohnung darf nicht unterschritten werden." },
    { nr: 34, q: "Eine Arbeitnehmerin ist Mitglied der zuständigen Gewerkschaft. Ihr Arbeitgeber gehört dem entsprechenden Arbeitgeberverband an. Wonach richtet sich die Höhe des Arbeitslohnes?", e: "Richtig ist: Die Lohnhöhe richtet sich nach dem gültigen Lohntarifvertrag.", o: ["Die Lohnhöhe richtet sich nach dem gültigen Lohntarifvertrag.", "Die Lohnhöhe richtet sich nach den Empfehlungen der Gewerkschaft.", "Die Lohnhöhe muss zwischen den Vertragsparteien frei ausgehandelt werden.", "Die Lohnhöhe richtet sich nach dem Mindestsatz der Sozialhilfe.", "Die Lohnhöhe wird gemeinsam von Arbeitgeber und Betriebsrat festgelegt."], correctText: "Die Lohnhöhe richtet sich nach dem gültigen Lohntarifvertrag." },
    { nr: 35, q: "Was ist im Betriebsverfassungsgesetz nicht geregelt?", e: "Richtig ist: Erlass von Unfallverhütungsvorschriften.", o: ["Mitbestimmungsrechte des Betriebsrats", "Recht zur Durchführung von Betriebsratswahlen", "Erlass von Unfallverhütungsvorschriften", "Aufgaben der Jugend- und Auszubildendenvertretung", "Zusammensetzung des Betriebsrats"], correctText: "Erlass von Unfallverhütungsvorschriften" },
    { nr: 36, q: "Für welche Betriebe sieht das Betriebsverfassungsgesetz die Wahl eines Betriebsrates vor?", e: "Richtig ist: Für Betriebe mit mindestens fünf ständigen wahlberechtigten Arbeitnehmern, von denen drei wählbar sein müssen.", o: ["Für Betriebe, in denen mehr als drei Arbeitnehmer beschäftigt werden.", "Für Betriebe, in denen mindestens fünf ständige wahlberechtigte Arbeitnehmer beschäftigt werden, von denen drei wählbar sein müssen.", "Für Betriebe, die einen Jahresumsatz von mindestens 25.000 € erzielen.", "Für Betriebe, in denen mindestens drei Arbeitnehmer beschäftigt werden, von denen mindestens einer wählbar ist.", "Für Betriebe, in denen mindestens vier ständige Arbeitnehmer beschäftigt werden und deren Jahresumsatz mindestens 50.000 € beträgt."], correctText: "Für Betriebe, in denen mindestens fünf ständige wahlberechtigte Arbeitnehmer beschäftigt werden, von denen drei wählbar sein müssen." },
    { nr: 37, q: "In welchem Fall können die Arbeitnehmer eines Industriebetriebs auf der Wahl eines Betriebsrates bzw. eines Betriebsobmannes bestehen?", e: "Richtig ist: Wenn mindestens 5 ständige wahlberechtigte Arbeitnehmer, von denen drei wählbar sind, beschäftigt werden.", o: ["Wenn in diesem Betrieb mindestens 3 ständige wahlberechtigte Arbeitnehmer, die auch wählbar sind, beschäftigt werden.", "Nur dann, wenn im Betrieb mehr als 10 ständige wahlberechtigte Arbeitnehmer, von denen 5 wählbar sind, beschäftigt werden.", "Wenn mindestens 5 ständige wahlberechtigte Arbeitnehmer, von denen drei wählbar sind, beschäftigt werden.", "Nur dann, wenn mehr als 20 ständige wahlberechtigte Arbeitnehmer beschäftigt werden.", "Nur dann, wenn mehr als 50 wählbare Arbeitnehmer beschäftigt werden."], correctText: "Wenn mindestens 5 ständige wahlberechtigte Arbeitnehmer, von denen drei wählbar sind, beschäftigt werden." },
    { nr: 38, q: "Welche Aussage über die Betriebsratswahlen ist falsch?", e: "Richtig ist: Wahlpflicht besteht für alle organisierten Arbeitnehmer.", o: ["Sie werden alle vier Jahre durchgeführt.", "Sie erfolgen geheim und unmittelbar.", "Wahlberechtigt sind alle Arbeitnehmer, die das 18. Lebensjahr vollendet haben.", "Wahlpflicht besteht für alle organisierten Arbeitnehmer.", "Die Kosten der Wahl tragen die Arbeitgeber."], correctText: "Wahlpflicht besteht für alle organisierten Arbeitnehmer." },
    { nr: 39, q: "Hat die Jugend- und Auszubildendenvertretung das Recht, selbst mit dem Arbeitgeber zu verhandeln?", e: "Richtig ist: Ja, wenn es um Fragen der Arbeitszeit und der Ausbildungsvergütung geht.", o: ["Ja, aber nur, wenn es um Fragen der Berufsausbildung geht.", "Nein, denn mit dem Arbeitgeber verhandelt nur der Vorsitzende des Betriebsrats.", "Ja, wenn es um Fragen der Arbeitszeit und der Ausbildungsvergütung geht.", "Nein, sie muss den Betriebsrat einschalten.", "Ja, aber nur wenn es um Fragen des Berufsschulunterrichts geht."], correctText: "Ja, wenn es um Fragen der Arbeitszeit und der Ausbildungsvergütung geht." },
    { nr: 40, q: "Welche der genannten Personen ist kein Arbeitnehmer im Sinne des Betriebsverfassungsgesetzes?", e: "Richtig ist: Vorstandsmitglied einer AG.", o: ["Umschüler", "Vorstandsmitglied einer AG", "Sekretärin des Arbeitgebers", "Gastarbeiter", "Teilzeitbeschäftigte"], correctText: "Vorstandsmitglied einer AG" },
    { nr: 41, q: "In einem Betrieb soll ein Betriebsrat gewählt werden. Wer kann in den Betriebsrat gewählt werden?", e: "Richtig ist: Wahlberechtigte, die das 18. Lebensjahr vollendet haben und mindestens 6 Monate im Betrieb sind.", o: ["Nur die Wahlberechtigten, die das 24. Lebensjahr vollendet haben.", "Nur die Wahlberechtigten, die einer Gewerkschaft angehören.", "Nur die Wahlberechtigten, die die deutsche Staatsangehörigkeit besitzen.", "Nur die Wahlberechtigten, die das 18. Lebensjahr vollendet haben und mindestens 6 Monate im Betrieb sind."], correctText: "Nur die Wahlberechtigten, die das 18. Lebensjahr vollendet haben und mindestens 6 Monate im Betrieb sind." },
    { nr: 42, q: "Welche Aussage über den Vorsitzenden des Betriebsrats ist richtig?", e: "Richtig ist: Den Vorsitzenden des Betriebsrats wählt der Betriebsrat aus seiner Mitte.", o: ["Vorsitzender des Betriebsrats ist derjenige, der bei der Betriebsratswahl die meisten Stimmen erhalten hat.", "Der Betriebsratsvorsitzende muss der größeren der beiden Gruppen angehören, wenn Arbeiter und Angestellte im Betrieb tätig sind.", "Zum Betriebsratsvorsitzenden kann vom Betriebsrat auch ein Arbeitnehmer gewählt werden, der nicht im Betriebsrat ist.", "Sind Arbeiter und Angestellte im Betriebsrat vertreten, muss eine Gruppe ein Betriebsratsmitglied zum Vorsitzenden wählen.", "Den Vorsitzenden des Betriebsrats wählt der Betriebsrat aus seiner Mitte."], correctText: "Den Vorsitzenden des Betriebsrats wählt der Betriebsrat aus seiner Mitte." },
    { nr: 43, q: "Wer übernimmt die Kosten, die durch die Tätigkeit des Betriebsrats verursacht werden?", e: "Richtig ist: Der Arbeitgeber.", o: ["Der Arbeitgeber", "Das Arbeitsamt", "Die im Betrieb vertretenen Gewerkschaften", "Die Betriebsratsmitglieder selbst, da die Tätigkeit ehrenamtlich ist.", "Die Kosten werden auf alle im Betrieb beschäftigten Arbeitnehmer umgelegt."], correctText: "Der Arbeitgeber" },
    { nr: 44, q: "Welches ist keine gesetzliche Aufgabe des Betriebsrats?", e: "Richtig ist: Darauf zu achten, dass die Produktionskosten niedrig bleiben und keine Arbeitsplätze gefährden.", o: ["Die Einhaltung der Tarifverträge und Unfallverhütungsvorschriften zu überwachen.", "Mit der Jugend- und Auszubildendenvertretung eng zusammenzuarbeiten.", "Die Eingliederung von Schwerbehinderten zu fördern.", "Darauf zu achten, dass die Produktionskosten niedrig bleiben und keine Arbeitsplätze gefährden.", "Die Beschäftigung älterer Arbeitnehmer im Betrieb zu fördern."], correctText: "Darauf zu achten, dass die Produktionskosten niedrig bleiben und keine Arbeitsplätze gefährden." },
    { nr: 45, q: "Wer ist wahlberechtigt bei der Wahl des Betriebsrats?", e: "Richtig ist: Alle Arbeitnehmer, die mindestens 18 Jahre alt sind.", o: ["Alle Arbeitnehmer, die dem Betrieb mindestens 6 Monate angehören.", "Alle Arbeitnehmer, die mindestens 18 Jahre alt sind.", "Alle Arbeitnehmer des Betriebes.", "Alle Arbeitnehmer mit deutscher Staatsangehörigkeit.", "Alle Arbeitnehmer, die Mitglied einer Gewerkschaft sind."], correctText: "Alle Arbeitnehmer, die mindestens 18 Jahre alt sind." },
    { nr: 46, q: "Ein 24-jähriger Arbeitnehmer will in seinem Betrieb bei der Wahl zur Jugend- und Auszubildendenvertretung kandidieren. Darf er gewählt werden?", e: "Richtig ist: Ja, denn er hat das 25. Lebensjahr noch nicht vollendet.", o: ["Ja, denn er hat das 25. Lebensjahr noch nicht vollendet.", "Nein, denn er ist bereits älter als 18 Jahre und somit volljährig.", "Nein, denn während seiner Amtszeit würde er das 25. Lebensjahr erreichen.", "Ja, wenn er noch Auszubildender ist; in diesem Fall ist das Lebensalter unerheblich.", "Ja, aber sobald er 25 Jahre alt wird, muss er aus dem Amt ausscheiden."], correctText: "Ja, denn er hat das 25. Lebensjahr noch nicht vollendet." },
    { nr: 47, q: "Wo werden die Einzelheiten der Tätigkeit des Betriebsrates gesetzlich geregelt?", e: "Richtig ist: Im Betriebsverfassungsgesetz.", o: ["Im Mitbestimmungsgesetz", "Im Arbeitsförderungsgesetz", "Im Betriebsverfassungsgesetz", "In der Gewerbeordnung", "Im Tarifvertragsgesetz"], correctText: "Im Betriebsverfassungsgesetz" },
    { nr: 48, q: "In welchem Fall darf der Arbeitgeber nach dem Betriebsverfassungsgesetz nicht allein entscheiden?", e: "Richtig ist: Über Beginn und Ende der täglichen Arbeitszeit sowie der Pausen.", o: ["Über die geplanten Werbemaßnahmen", "Über die Gehälter der leitenden Angestellten", "Über die Erzeugnisse, die er herstellen will", "Über Beginn und Ende der täglichen Arbeitszeit sowie der Pausen", "Über die Finanzierung von Investitionen"], correctText: "Über Beginn und Ende der täglichen Arbeitszeit sowie der Pausen" },
    { nr: 49, q: "Welche Aussage über den Streik ist richtig?", e: "Richtig ist: Ein Streik ist nur dann rechtmäßig, wenn er von einer Gewerkschaft geführt wird.", o: ["Jeder Streik bedarf der Zustimmung des Betriebsrats.", "Ein Streik ist nur dann rechtmäßig, wenn zuvor eine Urabstimmung stattgefunden hat, in der mindestens 75 % der Arbeitnehmer für einen Streik stimmen.", "Ein Streik darf erst begonnen werden, wenn der Bundesminister für Arbeit seine Zustimmung erteilt hat.", "Ein Streik ist nur dann rechtmäßig, wenn er von einer Gewerkschaft geführt wird.", "Nach 12 Wochen kann der Bundesminister für Arbeit einen Streik für beendet erklären, um die Wirtschaft vor Schaden zu bewahren."], correctText: "Ein Streik ist nur dann rechtmäßig, wenn er von einer Gewerkschaft geführt wird." },
    { nr: 50, q: "Welche Aussage über den Deutschen Gewerkschaftsbund (DGB) ist richtig?", e: "Richtig ist: Er ist die Dachorganisation der im DGB zusammengeschlossenen Einzelgewerkschaften.", o: ["Der Deutsche Gewerkschaftsbund kann zu Problemen des Schulwesens zu äußern.", "Er ist nicht berechtigt, sich zu Problemen des Schulwesens zu äußern.", "Er ist von den Weisungen der Bundesregierung abhängig.", "Er enthält sich grundsätzlich aller Stellungnahmen zu gesellschaftspolitischen Fragen.", "Er ist die Dachorganisation der im DGB zusammengeschlossenen Einzelgewerkschaften."], correctText: "Er ist die Dachorganisation der im DGB zusammengeschlossenen Einzelgewerkschaften." },
    { nr: 51, q: "Welche Leistungen gewähren die Gewerkschaften ihren Mitgliedern nicht?", e: "Richtig ist: Unterstützung bei Betriebsunfällen.", o: ["Unterstützungsleistungen bei Streiks", "Rechtsschutz bei Streitigkeiten aus dem Arbeitsverhältnis", "Unterstützung bei Betriebsunfällen", "Bildungsmaßnahmen für Jugendliche", "Vertretung vor dem Arbeitsgericht"], correctText: "Unterstützung bei Betriebsunfällen" },
    { nr: 52, q: "Welcher der genannten Vorteile ergibt sich aus der Zugehörigkeit zu einer Gewerkschaft für den Arbeitnehmer?", e: "Richtig ist: Rechtsvertretung bei Streitigkeiten vor dem Arbeitsgericht.", o: ["Rechtsvertretung bei Streitigkeiten vor dem Arbeitsgericht", "Geringerer Beitrag zur Arbeitslosenversicherung", "Höheres Krankengeld", "Anspruch auf zwei Wochen Bildungsurlaub pro Jahr", "Höherer Tariflohn"], correctText: "Rechtsvertretung bei Streitigkeiten vor dem Arbeitsgericht" },
    { nr: 53, q: "Wonach richtet es sich, welcher Einzelgewerkschaft des DGB ein Arbeitnehmer angehören kann?", e: "Richtig ist: Nach der Zugehörigkeit seines Betriebes zu einem bestimmten Wirtschaftszweig.", o: ["Nach seiner Stellung im Betrieb", "Nach seiner Ausbildung", "Nach der Zugehörigkeit seines Betriebes zu einem bestimmten Wirtschaftszweig", "Nach dem Beschäftigungsverhältnis", "Nach der freien Wahl des Arbeitnehmers"], correctText: "Nach der Zugehörigkeit seines Betriebes zu einem bestimmten Wirtschaftszweig" },
    { nr: 54, q: "Welche Aussage über die Gewerkschaften ist richtig?", e: "Richtig ist: Die Gewerkschaften vertreten die Forderungen der organisierten Arbeitnehmer gegenüber den Arbeitgebern.", o: ["Gewerkschaftsmitglied kann man erst nach Vollendung des 21. Lebensjahres werden.", "Die Gewerkschaften schließen mit den Unternehmungsleitungen Betriebsvereinbarungen ab.", "Die Gewerkschaften vertreten die Forderungen der organisierten Arbeitnehmer gegenüber den Arbeitgebern.", "Die Gewerkschaften sind Zusammenschlüsse aller Beschäftigten eines Wirtschaftszweiges.", "Die Gewerkschaften dürfen Tarifverträge nur im Einvernehmen mit den Arbeitgebern kündigen."], correctText: "Die Gewerkschaften vertreten die Forderungen der organisierten Arbeitnehmer gegenüber den Arbeitgebern." },
    { nr: 55, q: "Welche Aussage über die Betriebsversammlung ist richtig?", e: "Richtig ist: In jedem Kalendervierteljahr hat der Betriebsrat in einer Betriebsversammlung einen Tätigkeitsbericht abzugeben.", o: ["Nur Gewerkschaftsmitglieder dürfen an einer Betriebsversammlung teilnehmen.", "Betriebsversammlungen sind öffentliche Veranstaltungen, an denen jedermann teilnehmen darf.", "In jedem Kalendervierteljahr hat der Betriebsrat in einer Betriebsversammlung einen Tätigkeitsbericht abzugeben.", "Die Betriebsversammlung wird vom Arbeitgeber einberufen, wenn er es für nötig hält.", "Die Kosten der Betriebsversammlung trägt der Arbeitgeber."], correctText: "In jedem Kalendervierteljahr hat der Betriebsrat in einer Betriebsversammlung einen Tätigkeitsbericht abzugeben." },
    { nr: 56, q: "Welche Aussage über die Arbeitsgerichtsbarkeit ist nicht richtig?", e: "Richtig ist: Die Kosten des Verfahrens trägt immer der Arbeitgeber.", o: ["In allen Instanzen wirken Vertreter der Arbeitgeber und der Arbeitnehmer bei der Urteilsfindung mit.", "Vor Beginn der eigentlichen Verhandlung hat der Vorsitzende eine Güteverhandlung anzusetzen, in der eine gütliche Einigung versucht werden soll.", "Vor dem Arbeitsgericht besteht kein „Anwaltszwang“.", "Die Kosten des Verfahrens trägt immer der Arbeitgeber.", "Die Arbeitsgerichtsbarkeit besteht aus drei Instanzen."], correctText: "Die Kosten des Verfahrens trägt immer der Arbeitgeber." },
    { nr: 57, q: "Welche Aussage über die Betriebsversammlung im Sinne des Betriebsverfassungsgesetzes ist richtig?", e: "Richtig ist: Ist eine vom Betriebsrat einberufene Versammlung der Arbeitnehmer eines Betriebes, an welcher der Arbeitgeber teilnehmen darf.", o: ["Die Betriebsversammlung ist eine Sitzung des Betriebsrats.", "Ist eine Zusammenkunft der Aktionäre eines Betriebes, wird vom Arbeitgeber geleitet.", "Ist eine vom Arbeitgeber geleitete Versammlung der Arbeitnehmer eines Betriebes.", "Ist eine vom Betriebsrat einberufene Versammlung der Arbeitnehmer eines Betriebes, an welcher der Arbeitgeber teilnehmen darf.", "Ist eine vom Betriebsrat einberufene Versammlung der Arbeitnehmer eines Betriebes, an welcher der Arbeitgeber teilnehmen darf."], correctText: "Ist eine vom Betriebsrat einberufene Versammlung der Arbeitnehmer eines Betriebes, an welcher der Arbeitgeber teilnehmen darf." },
    { nr: 58, q: "Ein Firmeninhaber vereinbart im Mai mit einem Jugendlichen und dessen Eltern, den Jugendlichen ab 1. September zum Industriemechaniker auszubilden. Was muss der Firmeninhaber danach tun?", e: "Richtig ist: Er muss unverzüglich den Berufsausbildungsvertrag schriftlich abschließen.", o: ["Er muss unverzüglich den Berufsausbildungsvertrag schriftlich abschließen.", "Er muss den Jugendlichen sofort bei der Berufsschule anmelden.", "Er muss unverzüglich das Arbeitsamt um Genehmigung zur Einstellung bitten.", "Er muss ab 1. Juli die Ausbildungsvergütung zahlen.", "Er muss bis spätestens Ende August das Kultusministerium um Genehmigung zur Einstellung bitten."], correctText: "Er muss unverzüglich den Berufsausbildungsvertrag schriftlich abschließen." },
    { nr: 59, q: "Wer entscheidet in letzter Instanz bei Streitigkeiten aus dem Berufsausbildungsverhältnis?", e: "Richtig ist: Das Arbeitsgericht.", o: ["Der Betriebsrat", "Der Schlichtungsausschuss des Fachverbands", "Die Industrie- und Handelskammer", "Das Arbeitsgericht", "Das Landgericht"], correctText: "Das Arbeitsgericht" },
    { nr: 60, q: "Wer stellt nach dem Berufsbildungsgesetz fest, welcher Betrieb ausbilden darf?", e: "Richtig ist: Die zuständige Kammer, z. B. IHK oder Handwerkskammer.", o: ["Das Arbeitsamt", "Das Gewerbeaufsichtsamt", "Die zuständige Gewerkschaft", "Die Berufsgenossenschaft", "Die zuständige Kammer, wie z. B. die Industrie- und Handelskammer oder die Handwerkskammer"], correctText: "Die zuständige Kammer, wie z. B. die Industrie- und Handelskammer oder die Handwerkskammer" },
    { nr: 61, q: "Welche Probezeit darf bei einem Ausbildungsverhältnis höchstens vereinbart werden?", e: "Richtig ist: 4 Monate.", o: ["3 Wochen", "1 Monat", "2 Monate", "3 Monate", "4 Monate"], correctText: "4 Monate" },
    { nr: 62, q: "In welchem Fall kann ein Ausbildungsverhältnis auch nach der Probezeit gekündigt werden?", e: "Richtig ist: Vom Auszubildenden bei Berufsaufgabe oder Berufswechsel mit 4 Wochen Kündigungsfrist.", o: ["Vom Auszubildenden bei Berufsaufgabe oder bei Berufswechsel mit einer Kündigungsfrist von 4 Wochen.", "Vom Ausbildenden jederzeit fristlos ohne Angabe von Gründen.", "Vom Ausbildenden bei rückläufiger Auftragslage mit einer 4-monatigen Kündigungsfrist.", "Vom Ausbildenden jederzeit, wenn er feststellt, dass der Auszubildende das Ausbildungsziel nicht erreichen wird.", "Vom Ausbildenden jederzeit, ohne Angabe von Gründen, mit einer Kündigungsfrist von 4 Wochen."], correctText: "Vom Auszubildenden bei Berufsaufgabe oder bei Berufswechsel mit einer Kündigungsfrist von 4 Wochen." },

    }
    return copy;
  }

  // WICHTIG: Startet immer mit sortierter Liste 1-105
  function showAllQuestions() {
    activeQuestions = [...rawQuestions].sort((a, b) => a.nr - b.nr);
    document.getElementById('modeLabel').innerText = "Feste Reihenfolge";
    resetSession(false);
  }

  function showRandomOrder() {
    activeQuestions = shuffleArray([...rawQuestions]);
    document.getElementById('modeLabel').innerText = "Zufallsmodus";
    resetSession(false);
  }

  function resetSession(repeat) {
    cur = 0;
    states = Array(activeQuestions.length).fill(null);
    revealed = Array(activeQuestions.length).fill(false);
    isCorrectList = Array(activeQuestions.length).fill(null);
    isRepeatMode = repeat;
    render();
  }

  function render() {
    if (activeQuestions.length === 0) return;
    const data = activeQuestions[cur];

    document.getElementById('questionMeta').innerText = `Frage Nr. ${data.nr}`;
    document.getElementById('qText').innerText = data.q;
    document.getElementById('qn').innerText = cur + 1;
    document.getElementById('total').innerText = activeQuestions.length;
    document.getElementById('progressFill').style.width = ((cur + 1) / activeQuestions.length * 100) + "%";

    const box = document.getElementById('ansBox');
    box.innerHTML = "";

    data.o.forEach((opt, i) => {
      const b = document.createElement('button');
      b.className = 'answer-btn';
      if (states[cur] === opt) b.classList.add('selected');
      if (revealed[cur]) {
        if (opt === data.correctText) b.classList.add('correct');
        else if (states[cur] === opt) b.classList.add('wrong');
        b.disabled = true;
      }
      b.innerHTML = "<strong>" + String.fromCharCode(65 + i) + ".</strong> " + opt;
      b.onclick = () => {
        if (revealed[cur]) return;
        states[cur] = opt;
        revealed[cur] = true;
        isCorrectList[cur] = (opt === data.correctText);
        render();
      };
      box.appendChild(b);
    });

    const fb = document.getElementById('fbBox');
    fb.style.display = revealed[cur] ? 'block' : 'none';
    if (revealed[cur]) {
      fb.innerHTML = `<div class="feedback"><strong>${isCorrectList[cur] ? '✅ Richtig!' : '❌ Falsch!'}</strong><br><br>${data.e}</div>`;
    }

    document.getElementById('btnPrev').disabled = cur === 0;
    document.getElementById('btnNext').disabled = cur === activeQuestions.length - 1;
    updateStats();
    renderGrid();
  }

  function renderGrid() {
    const g = document.getElementById('qGrid');
    g.innerHTML = "";
    activeQuestions.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'grid-dot';
      if (isCorrectList[i] === true) d.classList.add('correct');
      else if (isCorrectList[i] === false) d.classList.add('wrong');
      if (i === cur) d.classList.add('active');
      d.innerText = i + 1;
      d.onclick = () => { cur = i; render(); };
      g.appendChild(d);
    });
  }

  function updateStats() {
    const answered = revealed.filter(Boolean).length;
    const correct = isCorrectList.filter(x => x === true).length;
    document.getElementById('statsCorrect').innerText = correct;
    document.getElementById('statsWrong').innerText = answered - correct;
  }

  function changeQ(dir) {
    cur = Math.max(0, Math.min(activeQuestions.length - 1, cur + dir));
    render();
  }

  function startWrongRepeat() {
    const wrongQs = activeQuestions.filter((_, i) => isCorrectList[i] === false);
    if (wrongQs.length === 0) return alert("Keine falschen Fragen vorhanden!");
    activeQuestions = shuffleArray(wrongQs);
    document.getElementById('modeLabel').innerText = "Fehler-Wiederholung";
    resetSession(true);
  }

  // Initialisierung
  showAllQuestions();
</script>
</body>
</html>
